<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Challenge | Great-Power Competition in AI</title>
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body data-page="final">
  <div id="site-header"></div>

  <main class="wrap">
    <header class="section-head">
      <div class="num">Final Challenge</div>
      <h1>Put It All Together</h1>
      <p class="lead">Ten questions across the full guide: the definition of frontier AI, the geography of the supply chain, the chip war, the compute buildout, and the politics of autonomous weapons. The realist lens, end to end.</p>
    </header>

    <div id="cert-host"></div>
    <section>
      <div class="quiz" data-quiz="final" data-next="sources.html" data-next-label="Look up the sources →"></div>
    </section>

    <nav class="page-nav">
      <a class="prv" href="weapons.html">← 5. Autonomous weapons</a>
      <a class="nxt" href="sources.html">Glossary &amp; Sources →</a>
    </nav>
  </main>

  <div id="site-footer"></div>

  <script src="data/sections.js"></script>
  <script src="data/quizzes.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/quiz.js"></script>
  <script>
    document.addEventListener("quizcomplete", function (e) {
      if (e.detail.id !== "final") return;
      var pct = e.detail.pct, score = e.detail.score, total = e.detail.total;
      var tier = pct === 100 ? "with Highest Honors"
               : pct >= 80  ? "with Distinction"
               : pct >= 60  ? "with a solid pass"
               : "— a good first attempt";
      var msg = pct >= 60
        ? "You can now read AI policy in realist terms: chokepoints, dependence, security dilemmas, strategic adaptation. That is the theoretical backbone of the most consequential strategic-technology contest of the decade."
        : "You have the full picture now. Revisit a section or two and try again — the map sets faster on the second pass.";
      var host = document.getElementById("cert-host");
      host.innerHTML =
        '<div class="cert">' +
          '<div class="seal">🏁</div>' +
          '<p class="eyebrow">Certificate of Completion</p>' +
          '<h2>Great-Power Competition in AI</h2>' +
          '<p style="margin:.2rem 0 0">Completed the Final Challenge <strong>' + tier + '</strong></p>' +
          '<p class="result-msg" style="margin:.4rem 0 .8rem">Score: <strong>' + score + ' / ' + total + ' (' + pct + '%)</strong></p>' +
          '<p class="muted" style="max-width:50ch;margin:0 auto 1rem">' + msg + '</p>' +
          '<button class="btn ghost" type="button" onclick="window.print()">🖨 Print or save this certificate</button>' +
        '</div>';
      host.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
